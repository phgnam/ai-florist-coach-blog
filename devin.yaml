# https://docs.devin.ai/onboard-devin/environment-yaml
# Install project dependencies (runs during builds, surfaced to agent at session start).
maintenance: |
  npm ci --no-audit --no-fund
knowledge:
  - name: build
    contents: |
      # Full prod build (Astro + Pagefind search index):
      npm run build
      # Astro-only build (faster when iterating on content/layout):
      npx astro build
  - name: dev
    contents: |
      # Dev server on http://0.0.0.0:5000 (Pagefind search NOT available in dev — use preview):
      npm run dev
  - name: preview
    contents: |
      # Serve the built dist/ locally on :5000 (use this to test Pagefind search):
      npm run preview
  - name: add-post
    contents: |
      # New articles MUST follow docs/seo-aeo-playbook.md:
      #   long-tail question title, Quick Answer block (40-60 words), all H2s as questions,
      #   FAQ section + inline FAQPage JSON-LD via <script type="application/ld+json" set:html={...}>
      # File location: src/content/posts/<slug>.mdx
      # Frontmatter schema: src/content.config.ts (title, description, pubDate, tags, author, draft, lang: 'en'|'vi')
